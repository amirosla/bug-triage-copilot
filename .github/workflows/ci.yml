name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install dev dependencies
        run: pip install ruff

      - name: Run ruff
        run: ruff check packages/ apps/ tests/

  # ── Unit tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          LLM_PROVIDER: mock
          GITHUB_WEBHOOK_SECRET: test-secret
          DATABASE_URL: "postgresql+psycopg://triage:triage@localhost:5432/bug_triage_test"
          REDIS_URL: "redis://localhost:6379/1"
        run: |
          PYTHONPATH=packages:. pytest tests/ -v --tb=short \
            --ignore=tests/integration \
            -x

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  # ── Integration tests (with Docker services) ─────────────────────────────────
  test-integration:
    name: Integration Tests (pytest + SQLite)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-intg-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-intg-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration tests (mocked DB)
        env:
          LLM_PROVIDER: mock
          GITHUB_WEBHOOK_SECRET: test-secret
        run: |
          PYTHONPATH=packages:. pytest tests/integration/ -v --tb=short

  # ── Docker build check ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: bug-triage-copilot-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: false
          tags: bug-triage-copilot-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
